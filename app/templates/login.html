{% extends "base.html" %}
{% block anon %}
<div class="min-h-screen flex items-center justify-center px-4">
  <form method="post" action="/admin/login" class="w-full max-w-sm bg-white rounded-lg shadow p-6 space-y-4">
    <div>
      <div class="text-lg font-semibold text-slate-900">Clinic Admin</div>
      <div class="text-sm text-slate-500">Sign in to view conversations and appointments</div>
    </div>
    <input name="password" type="password" placeholder="Admin password" required autofocus
           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-700">
    {% if error %}<div class="text-xs text-red-600">{{ error }}</div>{% endif %}
    <button class="w-full bg-slate-900 text-white text-sm py-2 rounded hover:bg-slate-800">Sign in</button>
  </form>
</div>
{% endblock %}
